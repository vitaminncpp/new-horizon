<span class="text-xl font-bold tracking-tight bg-gradient-to-r from-[#6C5CE7] to-[#8E44AD] bg-clip-text text-transparent">CircuitArchitect</span>
<nav class="hidden md:flex items-center gap-6">
<a class="text-indigo-400 border-b-2 border-indigo-500 pb-1 font-medium" href="#">Projects</a>
<a class="text-slate-400 hover:text-slate-100 transition-colors font-medium" href="#">Components</a>
<a class="text-slate-400 hover:text-slate-100 transition-colors font-medium" href="#">Simulate</a>
<a class="text-slate-400 hover:text-slate-100 transition-colors font-medium" href="#">Export</a>
</nav>
</div>
<div class="flex items-center gap-4">
<div class="flex items-center gap-1 bg-surface-container-lowest px-2 py-1 rounded-lg border border-white/5">
<button class="p-1.5 hover:bg-slate-800/50 rounded-md transition-all active:scale-95 text-slate-400 hover:text-secondary">
<span class="material-symbols-outlined text-[20px]">play_arrow</span>
</button>
<button class="p-1.5 hover:bg-slate-800/50 rounded-md transition-all active:scale-95 text-slate-400 hover:text-primary">

<button class="px-5 py-2 bg-gradient-to-r from-[#6C5CE7] to-[#8E44AD] text-white rounded-xl font-semibold shadow-lg active:scale-95 transition-all text-sm">

<div class="flex items-center gap-2">
<button class="p-2 text-slate-400 hover:bg-slate-800/50 rounded-full transition-all">
<span class="material-symbols-outlined">settings</span>

<span class="material-symbols-outlined text-[24px]">rebase_edit</span>
</button>
<button class="p-3 hover:bg-white/5 text-slate-400 hover:text-white rounded-xl transition-all" title="Capacitors">
<span class="material-symbols-outlined text-[24px]">battery_full</span>
</button>
<button class="p-3 hover:bg-white/5 text-slate-400 hover:text-white rounded-xl transition-all" title="Transistors">
<span class="material-symbols-outlined text-[24px]">developer_board</span>
</button>
<button class="p-3 hover:bg-white/5 text-slate-400 hover:text-white rounded-xl transition-all" title="Logic Gates">

</button>
<button class="p-3 hover:bg-white/5 text-slate-400 hover:text-white rounded-xl transition-all" title="Sensors">
<span class="material-symbols-outlined text-[24px]">sensors</span>
</button>
<div class="h-[1px] bg-white/10 mx-2 my-1"></div>
<button class="p-3 hover:bg-white/5 text-emerald-400 rounded-xl transition-all" title="Add Custom">
<span class="material-symbols-outlined text-[24px]">add_circle</span>
</button>
</div>

<div class="w-12 h-12 flex flex-col items-center justify-center rounded-xl bg-slate-900/50 hover:bg-slate-800 transition-all cursor-grab active:cursor-grabbing border border-transparent hover:border-emerald-500/30 group">
<span class="material-symbols-outlined text-emerald-400 text-sm">memory</span>
</div>
<div class="w-12 h-12 flex flex-col items-center justify-center rounded-xl bg-slate-900/50 hover:bg-slate-800 transition-all cursor-grab active:cursor-grabbing border border-transparent hover:border-emerald-500/30 group">
<span class="material-symbols-outlined text-emerald-400 text-sm">electric_bolt</span>
</div>
<div class="w-12 h-12 flex flex-col items-center justify-center rounded-xl bg-slate-900/50 hover:bg-slate-800 transition-all cursor-grab active:cursor-grabbing border border-transparent hover:border-emerald-500/30 group">
<span class="material-symbols-outlined text-emerald-400 text-sm">switch_left</span>
</div>
</div>
</div>
<!-- Main Canvas Area (Full Screen) -->
<section class="flex-1 relative bg-background canvas-grid overflow-hidden">

<span class="material-symbols-outlined text-lg">add</span>
</button>
</div>
<div class="w-[1px] h-6 bg-white/10 mx-1"></div>

<span class="material-symbols-outlined text-lg">grid_on</span>

<button class="p-2 hover:bg-white/10 rounded-xl transition-all text-on-surface-variant flex items-center justify-center" title="Center View">
<span class="material-symbols-outlined text-lg">center_focus_strong</span>
</button>
</div>
</div>

</div>
<div class="mt-2 text-center">
<span class="text-[10px] font-bold text-emerald-400/80 tracking-widest uppercase bg-emerald-500/10 px-2 py-0.5 rounded">IC-555 TIMER</span>

<div class="absolute top-1/2 left-1/2 group cursor-pointer -translate-x-1/2 -translate-y-1/2">

<div class="absolute top-[45%] right-[20%] group cursor-pointer">

<span class="material-symbols-outlined text-4xl text-tertiary-dim" style="font-variation-settings: 'FILL' 1;">battery_full</span>
</div>

<span class="text-[10px] font-bold text-tertiary/80 tracking-widest uppercase bg-tertiary/10 px-2 py-0.5 rounded">C1: 100μF</span>

<path d="M 320 280 L 480 280 M 640 280 L 800 280" fill="none" stroke="#aca3ff" stroke-dasharray="4" stroke-width="2"></path>
<path d="M 560 360 L 560 480 L 720 480" fill="none" stroke="#5ffbd6" stroke-width="2"></path>

<!-- Right Properties Panel (Maintained) -->

<div class="p-6">

<span class="material-symbols-outlined text-6xl text-primary z-10">rebase_edit</span>

<div class="space-y-4">
<label class="block">
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest block mb-2">Reference Tag</span>
<input class="w-full bg-surface-container-lowest border-none rounded-xl focus:ring-2 focus:ring-primary text-sm p-3 text-on-surface transition-all" type="text" value="R1"/>

<label class="block">
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest block mb-2">Resistance Value</span>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none rounded-xl focus:ring-2 focus:ring-primary text-sm p-3 pr-12 text-on-surface transition-all" type="number" value="10000"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-xs font-bold text-on-surface-variant">Ω</span>

<label class="block">
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest block mb-2">Tolerance</span>
<select class="w-full bg-surface-container-lowest border-none rounded-xl focus:ring-2 focus:ring-primary text-sm p-3 text-on-surface transition-all">
<option>1% (Brown)</option>
<option selected="">5% (Gold)</option>
<option>10% (Silver)</option>
</select>

<div class="flex items-center justify-between p-4 bg-surface-container/50 rounded-xl">

<div class="w-11 h-6 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-secondary"></div>

</div>

<div class="grid grid-cols-2 gap-3 pb-8">
<div class="bg-surface-container-lowest p-3 rounded-xl border border-outline-variant/10">
<span class="block text-[10px] text-on-surface-variant mb-1">Voltage Drop</span>
<span class="text-sm font-mono font-bold text-secondary">5.00V</span>
</div>
<div class="bg-surface-container-lowest p-3 rounded-xl border border-outline-variant/10">
<span class="block text-[10px] text-on-surface-variant mb-1">Current Flow</span>
<span class="text-sm font-mono font-bold text-primary">0.5mA</span>
</div>
</div>
</div>
</div>
<div class="p-6 mt-auto border-t border-white/5 bg-surface-container-low">
<button class="w-full py-4 bg-surface-variant hover:bg-surface-bright text-on-surface rounded-xl font-bold text-sm transition-all active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">delete</span>
                Delete Component
            </button>
</div>
</aside>
</main>
